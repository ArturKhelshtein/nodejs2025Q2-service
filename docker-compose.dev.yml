version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: home-library-postgres-dev
    restart: always
    ports:
      - '${POSTGRES_PORT}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - home-library-net

  app:
    container_name: home-library-app-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '${PORT}:${PORT}'
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - home-library-net
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    command: sh -c "npx prisma generate && echo 'Prisma generated' && npm run start:dev"

volumes:
  pgdata:

networks:
  home-library-net:
    driver: bridge
